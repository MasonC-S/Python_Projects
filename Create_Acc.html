 <div id="content">
     <h1>Create Account</h1>
     <form action="create_acc_database.php" method="POST">
         <div id="data">
             <label>First Name:</label>
             <input type="text" name="First_Name" required placeholder=" First Name" /> <br/>
             <label>Last Name:</label>
             <input type="text" name="Last_Name" required placeholder="Last Name" /> <br/>
             <label>UserName:</label>
             <input type="text" id="UserName" name="UserName" required placeholder="UserName" /> <br/>
             <label for="password">Password:</label>
             <input type="password" id="password" name="password" required onkeyup="checkPassword()" placeholder="password"><br/>
             <label for="confirm_password">Confirm Password:</label>
             <input type="password" id="confirm_password" name="confirm_password" required onkeyup="checkPassword()" placeholder="Confirm Password"><br/>
             <label>Game You Need Help With:</label>
             <input type="text" name="Game" placeholder="Game"/> <br/>

             <p id="message"></p>
         
         </div>

         
         <div id="buttons">
             <label>&nbsp;</label>
             <input type="submit" value="Create Account" /> <br/>
         </div>

         <script>
            function checkPassword(){
                const password = document.getElementById("password").value;
                const confirmPassword = document.getElementById("confirm_password").value;
                const message = document.getElementById("message");
    
                if(confirmPassword === ""){
                    message.textContent = "";
                } else if(password === confirmPassword){
                    message.textContent = "\u2705 Password and Confirm Password match!";
                    message.style.color = "green";
                } else {
                    message.textContent = "\u274c Password and Confirm Password do not match!";
                    message.style.color = "red";
                }
            }
        </script>
